name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend – install & test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm test

  build-admin-web:
    name: admin-web – install, lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/admin-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/admin-web/package-lock.json

      - run: npm ci

      # Non-blocking: surfaces lint issues in the log without failing the
      # pipeline on pre-existing lint debt unrelated to a given change.
      # `next build` below still fails the job on real type/build errors.
      - run: npm run lint
        continue-on-error: true

      - run: npm run build

  deploy-backend:
    name: Deploy backend to Vercel (production)
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: app

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Identifiers only (not credentials) — same values as this project's
      # gitignored app/.vercel/project.json.
      VERCEL_ORG_ID: team_RUmkOwJ67yFsJKTGJys0u2rD
      VERCEL_PROJECT_ID: prj_wKabaDhHYWHoYjzEQIjmBRFkoi8d

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --global vercel@latest

      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-user-web:
    name: Deploy candidate frontend to Vercel (production)
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: app/frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Identifiers only (not credentials) — same values as this project's
      # gitignored app/frontend/.vercel/project.json ("user-web"). This is the
      # standalone candidate frontend (served cross-origin from the API); it is
      # a SEPARATE Vercel project from the backend, so it needs its own deploy
      # job — a backend deploy never updates it. `vercel pull` brings this
      # project's TBT_API_BASE env var, and `vercel build` runs its npm build
      # (build-env.js) so the API origin is baked into assets/js/env.js.
      VERCEL_ORG_ID: team_RUmkOwJ67yFsJKTGJys0u2rD
      VERCEL_PROJECT_ID: prj_Ogk540OpdpbAnP8iPaqVQBSwDS34

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --global vercel@latest

      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-admin-web:
    name: Deploy admin-web to Vercel (production)
    needs: build-admin-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: app/admin-web

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Identifiers only (not credentials) — same values as this project's
      # gitignored app/admin-web/.vercel/project.json.
      VERCEL_ORG_ID: team_RUmkOwJ67yFsJKTGJys0u2rD
      VERCEL_PROJECT_ID: prj_ol6ircMQb1ZentvThTxPVUEMW4lY

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --global vercel@latest

      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
