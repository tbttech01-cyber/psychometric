<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Tamil Business Tribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#1E3A5F] to-[#162d4a]">
  <div id="toast-container"></div>
  <div class="w-full max-w-md mx-4">
    <div class="text-center mb-6">
      <img src="/assets/tbt-logo.png" alt="Tamil Business Tribe" class="mx-auto w-48 mb-4 object-contain" />
      <p class="text-blue-200 text-sm">Psychometric Assessment Platform</p>
    </div>
    <div class="card">
      <h2 class="text-xl font-bold mb-1" style="color:var(--tbt-primary)">Create Account</h2>
      <p class="text-sm mb-5" style="color:var(--tbt-muted)">Register to take your psychometric assessment</p>

      <div class="mb-3">
        <label class="block text-sm font-semibold mb-1" for="name">Full Name</label>
        <input id="name" type="text" placeholder="Your full name" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
        <p id="name-error" class="text-red-500 text-xs mt-1 hidden"></p>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-semibold mb-1" for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
        <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-semibold mb-1" for="password">Password <span class="font-normal text-xs" style="color:var(--tbt-muted)">(min 6 characters)</span></label>
        <input id="password" type="password" placeholder="Create a password" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
        <p id="password-error" class="text-red-500 text-xs mt-1 hidden"></p>
      </div>

      <button id="btn-register" class="btn btn-primary w-full">Register</button>
      <div class="mt-4 text-center text-sm" style="color:var(--tbt-muted)">
        Already registered? <a href="/user/login.html" class="font-semibold" style="color:var(--tbt-primary)">Login</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const codeId = localStorage.getItem('tbt_code_id');
    if (!codeId) window.location.href = '/user/index.html';

    document.getElementById('btn-register').addEventListener('click', async () => {
      Validator.clearAll(['name','email','password']);
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      if (!Validator.required(name)) { Validator.show('name','Name is required.'); valid = false; }
      if (!Validator.email(email)) { Validator.show('email','Valid email required.'); valid = false; }
      if (!Validator.password(password)) { Validator.show('password','Password must be at least 6 characters.'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Registering...';
      const { ok, data } = await api.post('/user/register', { codeId, name, email, password });
      btn.disabled = false; btn.textContent = 'Register';

      if (!ok) { showToast(data.message || 'Registration failed.', 'error'); return; }
      localStorage.setItem('tbt_pending_email', email);
      showToast(data.message, 'success');
      setTimeout(() => window.location.href = '/user/otp-register.html', 1000);
    });
  </script>
</body>
</html>
