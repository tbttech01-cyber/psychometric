<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Tamil Business Tribe</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#1E3A5F] to-[#162d4a]">
  <div id="toast-container"></div>
  <div class="w-full max-w-md mx-4">
    <div class="text-center mb-6">
      <img src="/assets/tbt-logo.png" alt="Tamil Business Tribe" class="mx-auto w-48 mb-4 object-contain" />
      <p class="text-blue-200 text-sm">Psychometric Assessment Platform</p>
    </div>
    <div class="card">
      <h2 class="text-xl font-bold mb-1" style="color:var(--tbt-primary)">Create Account</h2>
      <p class="text-sm mb-5" style="color:var(--tbt-muted)">Register to take your psychometric assessment</p>

      <form id="register-form" novalidate>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1" for="code">Access Code</label>
          <input id="code" name="code" type="text" autocomplete="off" placeholder="e.g. TBT2024" maxlength="20" class="w-full border-2 rounded-lg px-4 py-2.5 uppercase focus:outline-none" style="border-color:var(--tbt-border)" />
          <p id="code-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1" for="name">Full Name</label>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="Your full name" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
          <p id="name-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1" for="email">Email Address</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
          <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <div class="mb-5">
          <label class="block text-sm font-semibold mb-1" for="password">Password <span class="font-normal text-xs" style="color:var(--tbt-muted)">(min 6 characters)</span></label>
          <div style="position:relative">
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a password" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border);padding-right:2.75rem" />
            <button type="button" id="toggle-password" aria-label="Show password" style="position:absolute;top:0;bottom:0;right:0;display:flex;align-items:center;padding:0 0.75rem;background:none;border:none;cursor:pointer;color:var(--tbt-muted)">
              <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-off" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
            </button>
          </div>
          <p id="password-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <button id="btn-register" type="submit" class="btn btn-primary w-full">Register</button>
      </form>
      <div class="mt-4 text-center text-sm" style="color:var(--tbt-muted)">
        Already registered? <a href="/" class="font-semibold" style="color:var(--tbt-primary)">Login</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/env.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', () => { codeInput.value = codeInput.value.toUpperCase(); });

    // Show/hide the password while typing.
    (function () {
      const btn = document.getElementById('toggle-password');
      const inp = document.getElementById('password');
      const open = document.getElementById('eye-open');
      const off = document.getElementById('eye-off');
      btn.addEventListener('click', () => {
        const reveal = inp.type === 'password';
        inp.type = reveal ? 'text' : 'password';
        open.classList.toggle('hidden', reveal);
        off.classList.toggle('hidden', !reveal);
        btn.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
      });
    })();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      Validator.clearAll(['code','name','email','password']);
      const code = codeInput.value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      if (!Validator.required(code)) { Validator.show('code','Access code is required.'); valid = false; }
      if (!Validator.required(name)) { Validator.show('name','Name is required.'); valid = false; }
      if (!Validator.email(email)) { Validator.show('email','Valid email required.'); valid = false; }
      if (!Validator.password(password)) { Validator.show('password','Password must be at least 6 characters.'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Registering...';
      // Resolve the access code to its id first (public validation), then
      // register against it — registration is still cohort-scoped by the code.
      const codeRes = await api.post('/user/validate-code', { code });
      if (!codeRes.ok) {
        Validator.show('code', codeRes.data.message || 'Invalid access code.');
        btn.disabled = false; btn.textContent = 'Register';
        return;
      }
      const { ok, data } = await api.post('/user/register', { codeId: codeRes.data.codeId, name, email, password });
      btn.disabled = false; btn.textContent = 'Register';

      if (!ok) { showToast(data.message || 'Registration failed.', 'error'); return; }
      localStorage.setItem('tbt_pending_email', email);
      showToast(data.message, 'success');
      setTimeout(() => window.location.href = '/verify-otp', 1000);
    });
  </script>
</body>
</html>
