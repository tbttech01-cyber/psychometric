<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Results — Tamil Business Tribe</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/custom.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="min-h-screen" style="background:var(--tbt-bg)">
  <div id="toast-container"></div>
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <span class="font-bold text-lg" style="color:var(--tbt-primary)">Tamil Business Tribe</span>
      <button id="btn-logout" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div id="loading" class="text-center py-20" role="status" aria-live="polite"><div class="spinner mx-auto mb-4"></div><p style="color:var(--tbt-muted)">Loading results...</p></div>
    <div id="result-content" class="hidden space-y-6">

      <!-- Score card -->
      <div class="card text-center">
        <h2 class="text-2xl font-extrabold mb-1" id="assessment-title" style="color:var(--tbt-primary)">Your Assessment Results</h2>
        <p id="result-name" class="mb-6" style="color:var(--tbt-muted)"></p>
        <div class="flex flex-col items-center justify-center gap-2 mb-4">
          <div class="gauge-circle" id="gauge" style="--pct:0%">
            <span class="gauge-value" id="pct-value">0%</span>
          </div>
          <p class="text-xs uppercase tracking-wide font-semibold" id="score-label" style="color:var(--tbt-muted)">Business Readiness Score</p>
          <p id="total-marks" class="font-semibold text-lg mt-1" style="color:var(--tbt-text)"></p>
          <span id="level-badge" class="badge text-base px-4 py-1.5"></span>
        </div>
        <p id="explanation" class="text-sm max-w-xl mx-auto mb-5" style="color:var(--tbt-muted)"></p>
        <div id="answer-stats" class="flex flex-wrap justify-center gap-6 text-sm"></div>
      </div>

      <!-- Composite scores -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="composite-scores"></div>

      <!-- Radar + Category bars -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="card"><h3 class="font-bold mb-4" style="color:var(--tbt-primary)">Category Radar</h3><canvas id="radar-chart"></canvas></div>
        <div class="card">
          <h3 class="font-bold mb-4" style="color:var(--tbt-primary)">Category Breakdown</h3>
          <div id="cat-bars" class="space-y-3"></div>
        </div>
      </div>

      <!-- Dimension breakdown -->
      <div class="card" id="dimension-card">
        <h3 class="font-bold mb-4" style="color:var(--tbt-primary)">Dimension Breakdown</h3>
        <div id="dim-bars" class="space-y-3"></div>
      </div>

      <!-- Strong / Weak dimensions -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="strong-weak-section">
        <div class="card">
          <h3 class="font-bold text-lg mb-3" style="color:var(--tbt-success)">Strong Dimensions</h3>
          <div id="strong-dims" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="card">
          <h3 class="font-bold text-lg mb-3" style="color:var(--tbt-danger)">Weak Dimensions</h3>
          <div id="weak-dims" class="flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- Recommended business -->
      <div class="card">
        <h3 class="font-bold text-lg mb-3" style="color:var(--tbt-primary)">Top Business Recommendations</h3>
        <div id="biz-recommendations" class="space-y-3"></div>
      </div>

      <!-- Improvements -->
      <div class="card">
        <h3 class="font-bold text-lg mb-3" style="color:var(--tbt-primary)">Areas to Strengthen</h3>
        <div id="improvements" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <script src="/assets/js/env.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script src="/assets/js/charts.js"></script>
  <script>
    const token = api.requireAuth('user');
    // A fixed palette looks better for small counts, but the category count
    // is admin-configurable and unbounded, so it must not run out or repeat.
    const CAT_COLORS_BASE = ['#3B82F6','#8B5CF6','#F59E0B','#EF4444','#EC4899','#10B981','#F97316','#06B6D4'];
    function catColor(i, total) {
      if (total <= CAT_COLORS_BASE.length) return CAT_COLORS_BASE[i];
      return `hsl(${Math.round((i * 360) / total)}, 65%, 55%)`;
    }

    async function loadResult() {
      const { ok, data } = await api.get('/assessment/result', token);
      // Render an inline error + Retry instead of leaving the spinner forever.
      if (!ok || !data || !data.data) {
        document.getElementById('loading').innerHTML =
          '<p class="mb-4" style="color:var(--tbt-danger)">' + ((data && data.message) || "Couldn't load your results. Please check your connection.") + '</p>' +
          '<button class="btn btn-primary" onclick="location.reload()">Retry</button>';
        return;
      }
      const r = data.data;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('result-content').classList.remove('hidden');

      const testLabel = r.userId?.sharedUserID?.label || 'Your Assessment';
      document.title = `${testLabel} Results — Tamil Business Tribe`;
      document.getElementById('assessment-title').textContent = `${testLabel} Results`;
      document.getElementById('score-label').textContent = `${testLabel} Score`;
      document.getElementById('result-name').textContent = `${r.userId?.name || ''} — ${r.userId?.sharedCode || ''}`;
      document.getElementById('total-marks').textContent = `Total: ${r.totalMarks} / ${r.maxScore}`;
      document.getElementById('pct-value').textContent = `${r.percentage}%`;
      document.getElementById('gauge').style.setProperty('--pct', `${r.percentage * 3.6}deg`);
      document.getElementById('gauge').style.background = `conic-gradient(var(--tbt-primary) ${r.percentage * 3.6}deg, var(--tbt-border) 0deg)`;

      const LEVEL_KEYS = { 'Excellent': 'excellent', 'Good': 'good', 'Average': 'average', 'Needs Improvement': 'needs' };
      const lb = document.getElementById('level-badge');
      lb.textContent = r.level;
      lb.className = `badge badge-${LEVEL_KEYS[r.level] || 'average'}`;

      document.getElementById('explanation').textContent = r.explanation;

      const statsEl = document.getElementById('answer-stats');
      const hasCounts = r.correctCount != null || r.wrongCount != null || r.skippedCount != null;
      if (hasCounts) {
        statsEl.innerHTML = `
          <span><span class="font-bold" style="color:var(--tbt-success)">${r.correctCount ?? 0}</span> <span style="color:var(--tbt-muted)">Correct</span></span>
          <span><span class="font-bold" style="color:var(--tbt-danger)">${r.wrongCount ?? 0}</span> <span style="color:var(--tbt-muted)">Wrong</span></span>
          <span><span class="font-bold" style="color:var(--tbt-muted)">${r.skippedCount ?? 0}</span> <span style="color:var(--tbt-muted)">Skipped</span></span>`;
      }

      // Composite scores are additive (Phase 2) fields — absent on Result
      // documents predating them, so skip the whole panel rather than
      // showing four "undefined%" tiles for older results.
      const composites = [
        ['Aptitude', r.aptitudeScore], ['Personality', r.personalityScore],
        ['Business Mindset', r.businessMindsetScore], ['Financial Awareness', r.financialAwarenessScore],
      ].filter(([, v]) => v != null);
      const compositeEl = document.getElementById('composite-scores');
      compositeEl.innerHTML = composites.map(([label, v]) => `
        <div class="card text-center">
          <p class="text-2xl font-extrabold" style="color:var(--tbt-primary)">${v}%</p>
          <p class="text-xs font-semibold mt-1" style="color:var(--tbt-muted)">${label}</p>
        </div>`).join('');

      const cats = Object.entries(r.categoryPercentages || {});
      const labels = cats.map(([k]) => k);
      const values = cats.map(([,v]) => parseFloat(v));
      TBTCharts.radar('radar-chart', labels, values);

      const barsEl = document.getElementById('cat-bars');
      cats.forEach(([name, pct], i) => {
        barsEl.innerHTML += `<div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">${name}</span><span style="color:var(--tbt-muted)">${pct}%</span></div>
          <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:${catColor(i, cats.length)}"></div></div>
        </div>`;
      });

      const dims = Object.entries(r.dimensionPercentages || {});
      document.getElementById('dimension-card').classList.toggle('hidden', !dims.length);
      const dimBarsEl = document.getElementById('dim-bars');
      dims.forEach(([name, pct], i) => {
        dimBarsEl.innerHTML += `<div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">${name}</span><span style="color:var(--tbt-muted)">${pct}%</span></div>
          <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:${catColor(i, dims.length)}"></div></div>
        </div>`;
      });

      const strong = r.strongDimensions || [];
      const weak = r.weakDimensions || [];
      document.getElementById('strong-weak-section').classList.toggle('hidden', !strong.length && !weak.length);
      document.getElementById('strong-dims').innerHTML = strong.map(d =>
        `<span class="inline-block px-3 py-1 rounded-full text-sm font-semibold" style="background:#D1FAE5;color:#065F46">${d}${r.dimensionPercentages?.[d] != null ? ` (${r.dimensionPercentages[d]}%)` : ''}</span>`
      ).join('');
      document.getElementById('weak-dims').innerHTML = weak.map(d =>
        `<span class="inline-block px-3 py-1 rounded-full text-sm font-semibold" style="background:#FEE2E2;color:#991B1B">${d}${r.dimensionPercentages?.[d] != null ? ` (${r.dimensionPercentages[d]}%)` : ''}</span>`
      ).join('');

      // `recommendations` (business + explanation) is the Phase-2 field;
      // fall back to the plain `recommendedBusiness` name list for any
      // Result created before recommendations existed.
      const bizEl = document.getElementById('biz-recommendations');
      const recs = (r.recommendations && r.recommendations.length)
        ? r.recommendations
        : (r.recommendedBusiness || []).map(business => ({ business, explanation: '' }));
      bizEl.innerHTML = recs.map(rec => `
        <div class="rounded-lg p-4" style="background:rgba(203,20,23,0.06);border:1px solid rgba(203,20,23,0.2)">
          <p class="font-bold text-sm mb-1" style="color:var(--tbt-primary)">${rec.business}</p>
          ${rec.explanation ? `<p class="text-sm" style="color:var(--tbt-muted)">${rec.explanation}</p>` : ''}
        </div>`).join('');

      const impEl = document.getElementById('improvements');
      (r.improvementAreas || []).forEach(area => {
        impEl.innerHTML += `<div class="rounded-lg p-4" style="background:#FEF3C7;border:1px solid #FDE68A">
          <p class="font-bold text-sm mb-1" style="color:#92400E">${area.category} (${area.score}%)</p>
          <p class="text-sm" style="color:#78350F">${area.suggestion}</p>
        </div>`;
      });
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await api.post('/user/logout', {}, token).catch(() => {});
      api.clearSession();
      window.location.href = '/user/login.html';
    });

    loadResult();
  </script>
</body>
</html>
