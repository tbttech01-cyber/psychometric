<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamil Business Tribe — Enter Access Code</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/tailwind.css" />
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#1E3A5F] to-[#162d4a]">
  <div id="toast-container"></div>
  <div class="w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <img src="/assets/tbt-logo.png" alt="Tamil Business Tribe" class="mx-auto w-56 mb-4 object-contain" />
      <p class="text-blue-200 text-sm">Psychometric Assessment Platform</p>
    </div>
    <div class="card">
      <h2 class="text-xl font-bold text-center mb-1" style="color:var(--tbt-primary)">Welcome</h2>
      <p class="text-sm text-center mb-6" style="color:var(--tbt-muted)">Enter your access code to get started</p>
      <form id="code-form" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1" for="code">Access Code</label>
          <input id="code" name="code" type="text" autocomplete="off" placeholder="e.g. TBT2024" maxlength="20"
            class="w-full border-2 rounded-lg px-4 py-3 text-center text-xl font-bold tracking-widest uppercase focus:outline-none transition"
            style="border-color:var(--tbt-border)" />
          <p id="code-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>
        <button id="btn-continue" type="submit" class="btn btn-primary w-full">Continue</button>
      </form>
      <div class="mt-4 text-center text-sm" style="color:var(--tbt-muted)">
        Not you? <a id="link-logout" href="#" class="font-semibold" style="color:var(--tbt-primary)">Logout</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/env.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    // Step 2 of the flow (Login → Access Code → Question Set): this page is now
    // behind login. Require a valid session; a candidate who has already
    // finished goes straight to their result rather than re-entering a code —
    // UNLESS an admin has APPROVED a retest, in which case they must be allowed
    // to enter their access code here to begin the granted attempt (the entire
    // "Start Retest" flow routes back through this page).
    const token = api.requireAuth('user');
    api.protectBack(); // a bfcache back-restore must re-run these guards
    const currentUser = api.getUser();
    if (token && currentUser && currentUser.hasCompletedAssessment) {
      api.get('/assessment/retest/my-request', token)
        .then(({ ok, data }) => {
          const approved = ok && data && data.retest && data.retest.status === 'approved';
          if (!approved) window.location.replace('/result');
        })
        .catch(() => { window.location.replace('/result'); });
    }

    const btn = document.getElementById('btn-continue');
    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', () => { codeInput.value = codeInput.value.toUpperCase(); });
    document.getElementById('code-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      Validator.clearAll(['code']);
      const code = codeInput.value.trim();
      if (!Validator.required(code)) return Validator.show('code', 'Access code is required.');
      btn.disabled = true; btn.textContent = 'Checking...';
      // Authenticated select-code: validates the code AND binds its question set
      // to this user server-side, so the assessment loads that set dynamically.
      const { ok, data } = await api.post('/user/select-code', { code }, token);
      btn.disabled = false; btn.textContent = 'Continue';
      if (!ok) { Validator.show('code', data.message || 'Invalid code.'); return; }
      api.setCode(data.codeId, data.code);
      window.location.href = '/instructions';
    });

    document.getElementById('link-logout').addEventListener('click', (e) => {
      e.preventDefault();
      api.logoutWithConfirm(token);
    });
  </script>
</body>
</html>
