<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results — Tamil Business Tribe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="flex min-h-screen" style="background:var(--tbt-bg)">
  <div id="toast-container"></div>
  <nav class="sidebar hidden md:flex flex-col">
    <div class="p-5 border-b border-white/10"><h2 class="font-extrabold text-white text-lg leading-tight">Tamil Business<br/>Tribe Admin</h2></div>
    <div class="flex-1 py-4">
      <a href="/admin/dashboard.html">📊 Dashboard</a>
      <a href="/admin/shared-ids.html">🔑 Access Codes</a>
      <a href="/admin/question-types.html">🗂️ Question Types</a>
      <a href="/admin/questions.html">❓ Questions</a>
      <a href="/admin/answer-options.html">✅ Answer Options</a>
      <a href="/admin/results.html" class="active">📈 Results</a>
    </div>
    <div class="p-4 border-t border-white/10"><button id="btn-logout" class="text-sm text-white/70 hover:text-white">Logout</button></div>
  </nav>
  <div class="flex-1 overflow-auto">
    <header class="bg-white border-b px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold" style="color:var(--tbt-primary)">Assessment Results</h1>
      <div class="flex gap-2">
        <a id="btn-pdf" class="btn btn-primary btn-sm">Export PDF</a>
        <a id="btn-csv" class="btn btn-outline btn-sm">Export CSV</a>
      </div>
    </header>
    <main class="p-6 space-y-4">
      <!-- Filters -->
      <div class="card flex flex-wrap gap-3 items-end">
        <div><label class="block text-xs font-semibold mb-1">Search</label><input id="f-search" type="text" placeholder="Name / Email / Code" class="border-2 rounded-lg px-3 py-2 focus:outline-none" style="border-color:var(--tbt-border)" /></div>
        <div><label class="block text-xs font-semibold mb-1">Level</label>
          <select id="f-level" class="border-2 rounded-lg px-3 py-2 focus:outline-none" style="border-color:var(--tbt-border)">
            <option value="">All</option>
            <option>Excellent</option><option>Good</option><option>Average</option><option>Needs Improvement</option>
          </select>
        </div>
        <div><label class="block text-xs font-semibold mb-1">From</label><input id="f-from" type="date" class="border-2 rounded-lg px-3 py-2 focus:outline-none" style="border-color:var(--tbt-border)" /></div>
        <div><label class="block text-xs font-semibold mb-1">To</label><input id="f-to" type="date" class="border-2 rounded-lg px-3 py-2 focus:outline-none" style="border-color:var(--tbt-border)" /></div>
        <button id="btn-filter" class="btn btn-primary btn-sm">Apply</button>
        <button id="btn-clear" class="btn btn-outline btn-sm">Clear</button>
      </div>
      <!-- Table -->
      <div class="card overflow-x-auto">
        <p id="count" class="text-sm mb-3" style="color:var(--tbt-muted)"></p>
        <table class="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Code</th><th>Score</th><th>%</th><th>Level</th><th>Top Category</th><th>Date</th></tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
        <div class="flex justify-between items-center mt-4">
          <button id="btn-prev-pg" class="btn btn-outline btn-sm">← Prev</button>
          <span id="page-info" class="text-sm" style="color:var(--tbt-muted)"></span>
          <button id="btn-next-pg" class="btn btn-outline btn-sm">Next →</button>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const token = api.requireAuth('admin');
    let page = 1, totalPages = 1;

    function buildQS() {
      const p = new URLSearchParams();
      p.set('page', page); p.set('limit', 25);
      const s = document.getElementById('f-search').value.trim();
      const l = document.getElementById('f-level').value;
      const df = document.getElementById('f-from').value;
      const dt = document.getElementById('f-to').value;
      if (s) p.set('search', s);
      if (l) p.set('level', l);
      if (df) p.set('dateFrom', df);
      if (dt) p.set('dateTo', dt);
      return p.toString();
    }

    async function load() {
      const qs = buildQS();
      const { ok, data } = await api.get(`/admin/results?${qs}`, token);
      if (!ok) { showToast('Failed to load.', 'error'); return; }
      totalPages = data.pages || 1;
      document.getElementById('count').textContent = `${data.total} results found`;
      document.getElementById('page-info').textContent = `Page ${data.page} of ${totalPages}`;
      document.getElementById('btn-prev-pg').disabled = page <= 1;
      document.getElementById('btn-next-pg').disabled = page >= totalPages;

      const tbody = document.getElementById('tbl-body');
      tbody.innerHTML = data.data.map(r => `<tr>
        <td>${r.userId?.name||''}</td>
        <td class="text-xs">${r.userId?.email||''}</td>
        <td><span class="font-mono text-xs">${r.userId?.sharedCode||''}</span></td>
        <td class="font-bold">${r.totalMarks}/200</td>
        <td>${r.percentage}%</td>
        <td><span class="badge badge-${r.level.toLowerCase().replace(' ','').replace('improvement','needs')}">${r.level}</span></td>
        <td class="text-xs">${(r.highestCategory||[]).join(', ')}</td>
        <td class="text-xs">${new Date(r.createdAt).toLocaleDateString()}</td>
      </tr>`).join('');

      const qsExport = buildQS().replace(/page=\d+&?/, '').replace(/limit=\d+&?/, '');
      document.getElementById('btn-pdf').href = `/api/v1/admin/export/pdf?${qsExport}`;
      document.getElementById('btn-csv').href = `/api/v1/admin/export/csv?${qsExport}`;
    }

    document.getElementById('btn-filter').addEventListener('click', () => { page = 1; load(); });
    document.getElementById('btn-clear').addEventListener('click', () => {
      ['f-search','f-level','f-from','f-to'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      page = 1; load();
    });
    document.getElementById('btn-prev-pg').addEventListener('click', () => { if (page > 1) { page--; load(); } });
    document.getElementById('btn-next-pg').addEventListener('click', () => { if (page < totalPages) { page++; load(); } });
    document.getElementById('btn-logout').addEventListener('click', async () => {
      await api.post('/admin/logout', {}, token).catch(() => {});
      api.removeToken('admin'); window.location.href = '/admin/login.html';
    });

    load();
  </script>
</body>
</html>
