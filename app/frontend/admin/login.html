<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Tamil Business Tribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="min-h-screen flex items-center justify-center" style="background:var(--tbt-primary)">
  <div id="toast-container"></div>
  <div class="w-full max-w-sm mx-4">
    <div class="text-center mb-6">
      <div class="text-5xl mb-3">🛡️</div>
      <h1 class="text-2xl font-extrabold text-white">Admin Portal</h1>
      <p class="text-blue-200 text-sm">Tamil Business Tribe</p>
    </div>
    <div class="card">
      <div class="mb-3">
        <label class="block text-sm font-semibold mb-1" for="email">Admin Email</label>
        <input id="email" type="email" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
        <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-semibold mb-1" for="password">Password</label>
        <input id="password" type="password" class="w-full border-2 rounded-lg px-4 py-2.5 focus:outline-none" style="border-color:var(--tbt-border)" />
        <p id="password-error" class="text-red-500 text-xs mt-1 hidden"></p>
      </div>
      <button id="btn-login" class="btn btn-primary w-full">Login → Get OTP</button>
    </div>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    if (api.getToken('admin')) window.location.href = '/admin/dashboard.html';
    document.getElementById('btn-login').addEventListener('click', async () => {
      Validator.clearAll(['email','password']);
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!Validator.email(email)) return Validator.show('email','Valid email required.');
      if (!Validator.required(password)) return Validator.show('password','Password required.');
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Checking...';
      const { ok, data } = await api.post('/admin/login', { email, password });
      btn.disabled = false; btn.textContent = 'Login → Get OTP';
      if (!ok) { showToast(data.message || 'Login failed.', 'error'); return; }
      localStorage.setItem('tbt_admin_email', email);
      window.location.href = '/admin/otp.html';
    });
  </script>
</body>
</html>
