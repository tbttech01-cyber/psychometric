<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answer Options — Tamil Business Tribe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="flex min-h-screen" style="background:var(--tbt-bg)">
  <div id="toast-container"></div>
  <nav class="sidebar hidden md:flex flex-col">
    <div class="p-5 border-b border-white/10"><h2 class="font-extrabold text-white text-lg leading-tight">Tamil Business<br/>Tribe Admin</h2></div>
    <div class="flex-1 py-4">
      <a href="/admin/dashboard.html">📊 Dashboard</a>
      <a href="/admin/shared-ids.html">🔑 Access Codes</a>
      <a href="/admin/question-types.html">🗂️ Question Types</a>
      <a href="/admin/questions.html">❓ Questions</a>
      <a href="/admin/answer-options.html" class="active">✅ Answer Options</a>
      <a href="/admin/results.html">📈 Results</a>
    </div>
    <div class="p-4 border-t border-white/10"><button id="btn-logout" class="text-sm text-white/70 hover:text-white">Logout</button></div>
  </nav>
  <div class="flex-1 overflow-auto">
    <header class="bg-white border-b px-6 py-4"><h1 class="text-xl font-bold" style="color:var(--tbt-primary)">Answer Options</h1></header>
    <main class="p-6 space-y-4">
      <div class="card text-sm" style="background:#EFF6FF;border-color:#BFDBFE">
        All questions use a 5-point Likert scale seeded automatically (Strongly Disagree=1 … Strongly Agree=5). Select a question to view its options.
      </div>
      <div class="card flex gap-3">
        <label class="text-sm font-semibold self-center">Question:</label>
        <select id="f-question" class="border-2 rounded-lg px-3 py-2 flex-1 focus:outline-none" style="border-color:var(--tbt-border)">
          <option value="">— Select a question —</option>
        </select>
      </div>
      <div class="card overflow-x-auto" id="options-card" style="display:none">
        <table class="data-table"><thead><tr><th>Order</th><th>Label</th><th>Marks</th></tr></thead>
        <tbody id="tbl-body"></tbody></table>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const token = api.requireAuth('admin');

    async function loadQuestions() {
      const { ok, data } = await api.get('/admin/questions', token);
      if (!ok) return;
      const sel = document.getElementById('f-question');
      data.data.forEach(q => sel.innerHTML += `<option value="${q._id}">Q${q.order}: ${q.text.slice(0,60)}${q.text.length>60?'...':''}</option>`);
    }

    async function loadOptions(questionId) {
      const { ok, data } = await api.get(`/admin/answer-options?questionId=${questionId}`, token);
      if (!ok) return;
      document.getElementById('options-card').style.display = '';
      document.getElementById('tbl-body').innerHTML = data.data.map(o => `<tr>
        <td>${o.order}</td>
        <td class="font-semibold">${o.label}</td>
        <td><span class="badge badge-good">${o.marks}</span></td>
      </tr>`).join('');
    }

    document.getElementById('f-question').addEventListener('change', e => {
      if (e.target.value) loadOptions(e.target.value);
      else document.getElementById('options-card').style.display = 'none';
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await api.post('/admin/logout', {}, token).catch(() => {});
      api.removeToken('admin'); window.location.href = '/admin/login.html';
    });

    loadQuestions();
  </script>
</body>
</html>
