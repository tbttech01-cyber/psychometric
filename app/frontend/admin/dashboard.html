<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Tamil Business Tribe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="flex min-h-screen" style="background:var(--tbt-bg)">
  <div id="toast-container"></div>
  <!-- Sidebar -->
  <nav class="sidebar hidden md:flex flex-col">
    <div class="p-5 border-b border-white/10">
      <h2 class="font-extrabold text-white text-lg leading-tight">Tamil Business<br/>Tribe Admin</h2>
    </div>
    <div class="flex-1 py-4">
      <a href="/admin/dashboard.html" class="active">📊 Dashboard</a>
      <a href="/admin/shared-ids.html">🔑 Access Codes</a>
      <a href="/admin/question-types.html">🗂️ Question Types</a>
      <a href="/admin/questions.html">❓ Questions</a>
      <a href="/admin/answer-options.html">✅ Answer Options</a>
      <a href="/admin/results.html">📈 Results</a>
    </div>
    <div class="p-4 border-t border-white/10">
      <button id="btn-logout" class="text-sm text-white/70 hover:text-white">Logout</button>
    </div>
  </nav>

  <div class="flex-1 overflow-auto">
    <header class="bg-white border-b px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold" style="color:var(--tbt-primary)">Dashboard</h1>
      <span id="date-display" class="text-sm" style="color:var(--tbt-muted)"></span>
    </header>
    <main class="p-6">
      <div id="loading" class="text-center py-20"><div class="spinner mx-auto"></div></div>
      <div id="content" class="hidden space-y-6">
        <!-- KPI Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="kpi-grid"></div>
        <!-- Charts -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="card"><h3 class="font-bold mb-4" style="color:var(--tbt-primary)">Assessments (Last 30 Days)</h3><canvas id="bar-chart"></canvas></div>
          <div class="card"><h3 class="font-bold mb-4" style="color:var(--tbt-primary)">Business Distribution</h3><canvas id="donut-chart"></canvas></div>
        </div>
        <!-- Recent -->
        <div class="card">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold" style="color:var(--tbt-primary)">Recent Results</h3>
            <a href="/admin/results.html" class="text-sm font-semibold" style="color:var(--tbt-primary)">View all →</a>
          </div>
          <div class="overflow-x-auto"><table class="data-table" id="recent-table"><thead><tr><th>Name</th><th>Email</th><th>Code</th><th>Score</th><th>Level</th><th>Date</th></tr></thead><tbody></tbody></table></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script src="/assets/js/charts.js"></script>
  <script>
    const token = api.requireAuth('admin');
    document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    const KPI_KEYS = [
      { key:'totalUsersRegistered', label:'Registered Users', icon:'👤' },
      { key:'totalAssessmentsCompleted', label:'Completed', icon:'✅' },
      { key:'averageScore', label:'Avg Score', icon:'📊', suffix:'/200' },
      { key:'activeSharedCodes', label:'Active Codes', icon:'🔑' },
    ];

    async function load() {
      const { ok, data } = await api.get('/admin/dashboard', token);
      if (!ok) { showToast('Failed to load dashboard.', 'error'); return; }
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      const { cards, barChart, pieChart, recentResults } = data;
      const grid = document.getElementById('kpi-grid');
      KPI_KEYS.forEach(k => {
        grid.innerHTML += `<div class="card text-center">
          <div class="text-3xl mb-1">${k.icon}</div>
          <p class="text-2xl font-extrabold" style="color:var(--tbt-primary)">${cards[k.key]}${k.suffix||''}</p>
          <p class="text-xs mt-1" style="color:var(--tbt-muted)">${k.label}</p>
        </div>`;
      });

      const shortLabels = barChart.labels.map(d => d.slice(5));
      TBTCharts.bar('bar-chart', shortLabels, barChart.data, 'Assessments');
      if (pieChart.labels.length) TBTCharts.doughnut('donut-chart', pieChart.labels, pieChart.data);

      const tbody = document.querySelector('#recent-table tbody');
      recentResults.forEach(r => {
        tbody.innerHTML += `<tr>
          <td>${r.userId?.name||''}</td>
          <td>${r.userId?.email||''}</td>
          <td><span class="font-mono text-xs">${r.userId?.sharedCode||''}</span></td>
          <td class="font-bold">${r.totalMarks}/200</td>
          <td><span class="badge badge-${r.level.toLowerCase().replace(' ','').replace('improvement','needs')}">${r.level}</span></td>
          <td>${new Date(r.createdAt).toLocaleDateString()}</td>
        </tr>`;
      });
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await api.post('/admin/logout', {}, token).catch(() => {});
      api.removeToken('admin'); localStorage.removeItem('tbt_admin');
      window.location.href = '/admin/login.html';
    });

    load();
  </script>
</body>
</html>
