<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin OTP — Tamil Business Tribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="min-h-screen flex items-center justify-center" style="background:var(--tbt-primary)">
  <div id="toast-container"></div>
  <div class="w-full max-w-sm mx-4">
    <div class="card text-center">
      <div class="text-4xl mb-3">📧</div>
      <h2 class="text-xl font-bold mb-1" style="color:var(--tbt-primary)">Enter OTP</h2>
      <p class="text-sm mb-1" style="color:var(--tbt-muted)">Code sent to admin email</p>
      <p id="email-display" class="font-semibold mb-5" style="color:var(--tbt-primary)"></p>
      <div class="flex justify-center gap-2 mb-6">
        <input class="otp-box" type="text" maxlength="1" data-idx="0" />
        <input class="otp-box" type="text" maxlength="1" data-idx="1" />
        <input class="otp-box" type="text" maxlength="1" data-idx="2" />
        <input class="otp-box" type="text" maxlength="1" data-idx="3" />
        <input class="otp-box" type="text" maxlength="1" data-idx="4" />
        <input class="otp-box" type="text" maxlength="1" data-idx="5" />
      </div>
      <button id="btn-verify" class="btn btn-primary w-full">Verify & Login</button>
      <a href="/admin/login.html" class="block mt-3 text-sm" style="color:var(--tbt-muted)">← Back to login</a>
    </div>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const email = localStorage.getItem('tbt_admin_email');
    if (!email) window.location.href = '/admin/login.html';
    document.getElementById('email-display').textContent = email;

    const boxes = document.querySelectorAll('.otp-box');
    boxes.forEach((box, i) => {
      box.addEventListener('input', () => { if (box.value && i < 5) boxes[i+1].focus(); });
      box.addEventListener('keydown', e => { if (e.key==='Backspace' && !box.value && i>0) boxes[i-1].focus(); });
    });

    document.getElementById('btn-verify').addEventListener('click', async () => {
      const otp = Array.from(boxes).map(b => b.value).join('');
      if (!Validator.otp(otp)) return showToast('Enter all 6 digits.', 'error');
      const btn = document.getElementById('btn-verify');
      btn.disabled = true; btn.textContent = 'Verifying...';
      const { ok, data } = await api.post('/admin/verify-otp', { email, otp });
      btn.disabled = false; btn.textContent = 'Verify & Login';
      if (!ok) { showToast(data.message || 'Invalid OTP.', 'error'); return; }
      api.setToken('admin', data.token);
      localStorage.setItem('tbt_admin', JSON.stringify(data.admin));
      localStorage.removeItem('tbt_admin_email');
      window.location.href = '/admin/dashboard.html';
    });
  </script>
</body>
</html>
