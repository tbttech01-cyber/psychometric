<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Codes — Tamil Business Tribe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/custom.css" />
</head>
<body class="flex min-h-screen" style="background:var(--tbt-bg)">
  <div id="toast-container"></div>
  <nav class="sidebar hidden md:flex flex-col">
    <div class="p-5 border-b border-white/10"><h2 class="font-extrabold text-white text-lg leading-tight">Tamil Business<br/>Tribe Admin</h2></div>
    <div class="flex-1 py-4">
      <a href="/admin/dashboard.html">📊 Dashboard</a>
      <a href="/admin/shared-ids.html" class="active">🔑 Access Codes</a>
      <a href="/admin/question-types.html">🗂️ Question Types</a>
      <a href="/admin/questions.html">❓ Questions</a>
      <a href="/admin/answer-options.html">✅ Answer Options</a>
      <a href="/admin/results.html">📈 Results</a>
    </div>
    <div class="p-4 border-t border-white/10"><button id="btn-logout" class="text-sm text-white/70 hover:text-white">Logout</button></div>
  </nav>
  <div class="flex-1 overflow-auto">
    <header class="bg-white border-b px-6 py-4"><h1 class="text-xl font-bold" style="color:var(--tbt-primary)">Access Codes</h1></header>
    <main class="p-6 space-y-4">
      <!-- Create form -->
      <div class="card">
        <h3 class="font-bold mb-3" style="color:var(--tbt-primary)">Create New Code</h3>
        <div class="flex gap-3 flex-wrap">
          <input id="new-code" type="text" placeholder="Code (e.g. TBT2025)" maxlength="20" class="border-2 rounded-lg px-3 py-2 uppercase font-mono focus:outline-none" style="border-color:var(--tbt-border)" />
          <input id="new-label" type="text" placeholder="Label / Group name" class="border-2 rounded-lg px-3 py-2 flex-1 min-w-48 focus:outline-none" style="border-color:var(--tbt-border)" />
          <button id="btn-create" class="btn btn-primary">Create</button>
        </div>
      </div>
      <!-- Table -->
      <div class="card overflow-x-auto">
        <div class="flex gap-3 mb-4">
          <input id="search" type="text" placeholder="Search codes..." class="border-2 rounded-lg px-3 py-2 focus:outline-none flex-1" style="border-color:var(--tbt-border)" />
        </div>
        <table class="data-table"><thead><tr><th>Code</th><th>Label</th><th>Status</th><th>Usage</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="tbl-body"></tbody></table>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/validator.js"></script>
  <script>
    const token = api.requireAuth('admin');
    let allData = [];

    async function load(search = '') {
      const qs = search ? `?search=${encodeURIComponent(search)}` : '';
      const { ok, data } = await api.get(`/admin/shared-ids${qs}`, token);
      if (!ok) { showToast('Failed to load.', 'error'); return; }
      allData = data.data;
      render(allData);
    }

    function render(rows) {
      const tbody = document.getElementById('tbl-body');
      tbody.innerHTML = rows.map(r => `<tr>
        <td class="font-mono font-bold">${r.code}</td>
        <td>${r.label}</td>
        <td><span class="badge ${r.isActive ? 'badge-good' : 'badge-needs'}">${r.isActive ? 'Active' : 'Inactive'}</span></td>
        <td>${r.usageCount}</td>
        <td>${new Date(r.createdAt).toLocaleDateString()}</td>
        <td class="flex gap-2">
          <button onclick="toggle('${r._id}',${r.isActive})" class="btn btn-sm ${r.isActive ? 'btn-danger' : 'btn-primary'}">${r.isActive ? 'Deactivate' : 'Activate'}</button>
        </td>
      </tr>`).join('');
    }

    async function toggle(id, isActive) {
      const { ok } = await api.put(`/admin/shared-ids/${id}`, { isActive: !isActive }, token);
      if (!ok) { showToast('Update failed.', 'error'); return; }
      showToast(isActive ? 'Deactivated.' : 'Activated.', 'success');
      load(document.getElementById('search').value);
    }

    document.getElementById('btn-create').addEventListener('click', async () => {
      const code = document.getElementById('new-code').value.trim().toUpperCase();
      const label = document.getElementById('new-label').value.trim();
      if (!code || !label) return showToast('Code and label required.', 'error');
      const { ok, data } = await api.post('/admin/shared-ids', { code, label }, token);
      if (!ok) { showToast(data.message || 'Failed.', 'error'); return; }
      showToast('Code created!', 'success');
      document.getElementById('new-code').value = '';
      document.getElementById('new-label').value = '';
      load();
    });

    let searchTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => load(e.target.value), 400);
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await api.post('/admin/logout', {}, token).catch(() => {});
      api.removeToken('admin'); window.location.href = '/admin/login.html';
    });

    load();
  </script>
</body>
</html>
